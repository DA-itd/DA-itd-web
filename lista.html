<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Generador de Listas ITD</title>
    
    <!-- Estilos y Fuentes -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f5f7fa; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        /* Scrollbar personalizada para la lista de campos */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 3px; }
    </style>

    <!-- Import Map para React y Librerías -->
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.2.0",
    "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
    "papaparse": "https://esm.sh/papaparse@5.4.1",
    "xlsx": "https://esm.sh/xlsx@0.18.5",
    "jspdf": "https://esm.sh/jspdf@2.5.1",
    "jspdf-autotable": "https://esm.sh/jspdf-autotable@3.8.2",
    "lucide-react": "https://esm.sh/lucide-react@0.263.1",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/"
  }
}
</script>
    
    <!-- Babel para compilar JSX en el navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useMemo, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import Papa from 'papaparse';
        import * as XLSX from 'xlsx';
        import { jsPDF } from 'jspdf';
        import autoTable from 'jspdf-autotable';
        import { Database, Users, FileText, ArrowLeft, Loader2, Calendar, BookOpen, CheckSquare, FileSpreadsheet, Download } from 'lucide-react';

        // --- CONSTANTES Y CONFIGURACIÓN ---
        const ITD_COLORS = {
            blue: '#1b396a',
            gold: '#d4a017',
            maroon: '#8B1538',
        };

        const HEADER_MAP_PARTICIPANTS = {
            'folio personal': 'FolioPersonal', 'folio': 'FolioPersonal',
            'nombrecompleto': 'NombreCompleto', 'nombre completo': 'NombreCompleto', 'nombre': 'NombreCompleto', 'participante': 'NombreCompleto',
            'curp': 'Curp', 'email': 'Email', 'correo': 'Email',
            'departamento': 'Departamento', 'area': 'Departamento',
            'id_curso': 'Id_Curso', 'clave': 'Id_Curso', 'clave curso': 'Id_Curso',
            'curso': 'Curso', 'nombre del curso': 'Curso',
            'fechacurso': 'FechaCurso', 'fecha': 'FechaCurso', 'periodo': 'FechaCurso',
            'horario': 'Horario', 'hora': 'Horario',
            'horas': 'Horas', 'tipo': 'Tipo', 'nivel': 'Nivel'
        };

        const HEADER_MAP_INSTRUCTORS = {
            'id': 'Id_Curso',
            'name': 'Curso',
            'date': 'FechaCurso',
            'period': 'Periodo',
            'horas': 'Horas',
            'location': 'Lugar',
            'schedule': 'Horario',
            'type': 'Tipo',
            'departamento': 'Departamento',
            'instructor': 'NombreInstructor'
        };

        // --- SERVICIOS ---

        const normalizeData = (data, map) => {
            return data.map(row => {
                const newRow = {};
                Object.keys(row).forEach(key => {
                    const cleanKey = key.trim().toLowerCase();
                    const normalizedKey = map[cleanKey] || map[Object.keys(map).find(k => cleanKey.includes(k))] || key.trim();
                    newRow[normalizedKey] = row[key];
                });
                return newRow;
            });
        };

        const parseFile = (file, map) => {
            return new Promise((resolve, reject) => {
                const isCSV = file.name.toLowerCase().endsWith('.csv');
                if (isCSV) {
                    Papa.parse(file, {
                        header: true,
                        skipEmptyLines: true,
                        complete: (results) => resolve(normalizeData(results.data, map)),
                        error: (err) => reject(err),
                    });
                } else {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        try {
                            const data = new Uint8Array(e.target.result);
                            const workbook = XLSX.read(data, { type: 'array' });
                            const sheetName = workbook.SheetNames[0];
                            const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName], { defval: "" });
                            resolve(normalizeData(jsonData, map));
                        } catch (err) { reject(err); }
                    };
                    reader.readAsArrayBuffer(file);
                }
            });
        };

        // --- COMPONENTES UI ---

        const LoadingOverlay = ({ isLoading, message }) => {
            if (!isLoading) return null;
            return (
                <div className="fixed inset-0 z-50 flex flex-col items-center justify-center bg-white/80 backdrop-blur-sm">
                    <Loader2 className="animate-spin h-12 w-12 mb-3" style={{ color: ITD_COLORS.blue }} />
                    <p className="font-semibold" style={{ color: ITD_COLORS.blue }}>{message}</p>
                </div>
            );
        };

        const Header = () => (
            <header className="bg-white shadow-md sticky top-0 z-20">
                <div className="container mx-auto px-4 py-4 flex justify-between items-center">
                    <div className="flex items-center gap-4">
                        <img src="https://raw.githubusercontent.com/DA-itd/web/main/logo_itdurango.png" alt="ITD Logo" className="h-12 w-auto object-contain" />
                        <div className="hidden md:block">
                            <h1 className="text-xl font-bold text-gray-800">Generador de Listas</h1>
                            <p className="text-sm text-gray-600">Herramientas Digitales ITD</p>
                        </div>
                    </div>
                    <a href="#" className="text-gray-600 hover:text-blue-800 font-medium flex items-center gap-2">
                        <ArrowLeft size={18} /> <span className="hidden sm:inline">Volver</span>
                    </a>
                </div>
                <div className="h-2 w-full" style={{ backgroundColor: ITD_COLORS.maroon }}></div>
            </header>
        );

        // --- APP PRINCIPAL ---

        const App = () => {
            const [participantData, setParticipantData] = useState([]);
            const [instructorData, setInstructorData] = useState([]);
            const [loading, setLoading] = useState(false);
            
            const [allFields, setAllFields] = useState([]);
            const [selectedFields, setSelectedFields] = useState([]);
            
            const [selectedDate, setSelectedDate] = useState("");
            const [selectedCourseId, setSelectedCourseId] = useState("");

            // 1. Manejo de Fechas (Uniendo ambos datasets)
            const availableDates = useMemo(() => {
                const datesSet = new Set();
                participantData.forEach(r => r.FechaCurso && datesSet.add(r.FechaCurso.trim()));
                instructorData.forEach(r => r.FechaCurso && datesSet.add(r.FechaCurso.trim()));
                return Array.from(datesSet).sort();
            }, [participantData, instructorData]);

            // 2. Manejo de Cursos (Prioridad al Maestro de Instructores)
            const availableCourses = useMemo(() => {
                const coursesMap = new Map();
                
                // Base: Archivo de Instructores
                instructorData.forEach(c => {
                    if (selectedDate && c.FechaCurso !== selectedDate) return;
                    coursesMap.set(c.Id_Curso, c.Curso);
                });

                // Complemento: Archivo de Alumnos
                participantData.forEach(row => {
                    if (selectedDate && row.FechaCurso !== selectedDate) return;
                    const id = String(row.Id_Curso || row.Curso || "");
                    const name = String(row.Curso || "Sin Nombre");
                    if (id && !coursesMap.has(id)) {
                        coursesMap.set(id, name);
                    }
                });

                return Array.from(coursesMap.entries())
                    .map(([id, name]) => ({ id, name }))
                    .sort((a, b) => a.name.localeCompare(b.name));
            }, [participantData, instructorData, selectedDate]);

            // 3. Cruce de Datos (El núcleo de la lógica)
            const activeCourseData = useMemo(() => {
                if (!selectedCourseId) return null;

                // Buscar metadatos en el archivo de instructores
                let meta = instructorData.find(c => String(c.Id_Curso) === selectedCourseId);
                
                // Filtrar alumnos
                const students = participantData.filter(s => 
                    String(s.Id_Curso) === selectedCourseId || String(s.Curso) === selectedCourseId
                );

                // Si no hay metadatos en el archivo de instructores, intentar inferir del primer alumno
                if (!meta && students.length > 0) {
                    const first = students[0];
                    meta = {
                        Id_Curso: first.Id_Curso || "",
                        Curso: first.Curso || "",
                        FechaCurso: first.FechaCurso || "",
                        Periodo: first.Periodo || "",
                        Horas: first.Horas || "30",
                        Lugar: first.Lugar || "",
                        Horario: first.Horario || "",
                        Tipo: first.Tipo || "",
                        Departamento: first.Departamento || "",
                        NombreInstructor: first.NombreInstructor || first.Instructor || "Por definir"
                    };
                }

                if (!meta) return null;

                // Fusionar metadatos en cada alumno para visualización
                const mergedStudents = students.map(s => ({
                    ...s,
                    NombreInstructor: meta.NombreInstructor || s.NombreInstructor,
                    Horario: meta.Horario || s.Horario,
                    Lugar: meta.Lugar || s.Lugar,
                    Departamento: meta.Departamento || s.Departamento
                }));

                return { meta, students: mergedStudents };
            }, [selectedCourseId, participantData, instructorData]);

            // --- MANEJADORES DE ARCHIVOS ---

            const handleParticipantUpload = async (e) => {
                const file = e.target.files?.[0];
                if (!file) return;
                setLoading(true);
                try {
                    const data = await parseFile(file, HEADER_MAP_PARTICIPANTS);
                    setParticipantData(data);
                    
                    // Inicializar campos
                    const fields = new Set();
                    data.forEach(r => Object.keys(r).forEach(k => fields.add(k)));
                    const fieldArray = Array.from(fields);
                    setAllFields(fieldArray);
                    
                    const defaults = ['FolioPersonal', 'NombreCompleto', 'Curp', 'Email', 'Curso', 'Departamento'];
                    setSelectedFields(fieldArray.filter(f => defaults.includes(f)));
                } catch (err) {
                    alert("Error al leer archivo de participantes: " + err.message);
                } finally { setLoading(false); }
            };

            const handleInstructorUpload = async (e) => {
                const file = e.target.files?.[0];
                if (!file) return;
                setLoading(true);
                try {
                    const data = await parseFile(file, HEADER_MAP_INSTRUCTORS);
                    setInstructorData(data);
                    
                    // Agregar campos nuevos a la selección
                    setAllFields(prev => {
                        const combined = new Set([...prev, "NombreInstructor", "Lugar", "Horas", "Periodo", "Horario"]);
                        return Array.from(combined);
                    });
                } catch (err) {
                    alert("Error al leer archivo de instructores.");
                } finally { setLoading(false); }
            };

            // --- GENERADORES DE REPORTES ---

            const generateOfficialPDF = () => {
                if (!activeCourseData) return;
                const { students, meta } = activeCourseData;
                
                try {
                    const doc = new jsPDF('landscape', 'mm', 'letter');
                    const width = doc.internal.pageSize.getWidth();

                    // Encabezado
                    doc.setLineWidth(0.5);
                    doc.rect(10, 10, width - 20, 25);
                    
                    doc.setFontSize(8);
                    doc.text("LOGO ITD", 20, 22);
                    doc.line(40, 10, 40, 35);
                    
                    doc.setFontSize(10);
                    doc.setFont("helvetica", "bold");
                    doc.text("INSTITUTO TECNOLÓGICO DE DURANGO", width / 2, 15, { align: "center" });
                    doc.setFontSize(9);
                    doc.setFont("helvetica", "normal");
                    doc.text("Nombre del documento: Formato de Lista de Asistencia", width / 2, 20, { align: "center" });
                    doc.text("Referencias a la Norma NMX-CC-9001-IMNC-2008", width / 2, 25, { align: "center" });
                    doc.text("6.2.2", width / 2, 30, { align: "center" });

                    doc.line(width - 60, 10, width - 60, 35);
                    doc.setFontSize(8);
                    doc.text("Código: ITD-AD-FO-8", width - 58, 14);
                    doc.line(width - 60, 16, width - 10, 16);
                    doc.text("Revisión: 1", width - 58, 20);
                    doc.line(width - 60, 22, width - 10, 22);
                    doc.text("Página 1 de 1", width - 58, 26);
                    doc.line(width - 60, 28, width - 10, 28);
                    doc.text("Fecha: 15/nov/2013", width - 58, 32);

                    // Datos del Curso
                    doc.setFont("helvetica", "bold");
                    doc.setFontSize(12);
                    doc.text("CURSO PRESENCIAL", width / 2, 45, { align: "center" });

                    doc.setDrawColor(0);
                    doc.rect(width - 60, 40, 50, 8);
                    doc.setFontSize(8);
                    doc.text("CLAVE:", width - 58, 45);
                    doc.setFont("helvetica", "normal");
                    doc.text(String(meta.Id_Curso || ""), width - 40, 45);

                    let currentY = 55;
                    const leftMargin = 10;
                    doc.setFontSize(9);
                    doc.text(`Nombre del curso: ${meta.Curso || ''}`, leftMargin, currentY);
                    currentY += 6;
                    doc.text(`Nombre del instructor (a): ${meta.NombreInstructor || ''}`, leftMargin, currentY); 
                    currentY += 6;
                    
                    doc.text(`Periodo: ${meta.FechaCurso || meta.Periodo || ''}`, leftMargin, currentY);
                    doc.text(`Duración: ${meta.Horas || '30'} horas`, width / 2, currentY);
                    doc.text(`Horario: ${meta.Horario || ''}`, width - 70, currentY);

                    // Tabla
                    const tableBody = students.map((s, index) => [
                        index + 1,
                        s.NombreCompleto || '',
                        s.Curp || '',
                        // AQUI SE ELIMINÓ EL "Tipo" (Profesional) SOLO SE DEJA EL DEPARTAMENTO
                        s.Departamento || '',
                        '', '', '', '', '', '', ''
                    ]);

                    while(tableBody.length < 15) {
                        tableBody.push([tableBody.length + 1, '', '', '', '', '', '', '', '', '', '']);
                    }

                    autoTable(doc, {
                        startY: currentY + 5,
                        head: [
                            [
                                { content: 'No.', styles: { valign: 'middle', halign: 'center' }, rowSpan: 2 },
                                { content: 'Nombre del Participante', styles: { valign: 'middle', halign: 'center' }, rowSpan: 2 },
                                { content: 'R.F.C.', styles: { valign: 'middle', halign: 'center' }, rowSpan: 2 },
                                { content: 'Puesto y depto', styles: { valign: 'middle', halign: 'center' }, rowSpan: 2 },
                                { content: 'Nivel', styles: { valign: 'middle', halign: 'center' }, colSpan: 2 },
                                { content: 'Asistencia', styles: { valign: 'middle', halign: 'center' }, colSpan: 5 }
                            ],
                            ['FD', 'D', 'L', 'M', 'M', 'J', 'V']
                        ],
                        body: tableBody,
                        theme: 'grid',
                        styles: { fontSize: 8, cellPadding: 1, lineColor: [0,0,0], lineWidth: 0.1, textColor: [0,0,0] },
                        headStyles: { fillColor: [255,255,255], textColor: [0,0,0], lineWidth: 0.1, lineColor: [0,0,0], fontStyle: 'bold' },
                        columnStyles: {
                            0: { cellWidth: 10 }, 1: { cellWidth: 80 }, 2: { cellWidth: 35 }, 3: { cellWidth: 60 },
                            4: { cellWidth: 8 }, 5: { cellWidth: 8 }, 6: { cellWidth: 8 }, 7: { cellWidth: 8 }, 8: { cellWidth: 8 }, 9: { cellWidth: 8 }, 10: { cellWidth: 8 }
                        },
                        margin: { left: 10, right: 10 }
                    });

                    const finalY = doc.lastAutoTable.finalY || 150;
                    doc.setFontSize(8);
                    doc.text("FD = Funcionario docente        D = Docente", 10, finalY + 5);
                    doc.line(50, finalY + 35, 120, finalY + 35);
                    doc.text("Firma del instructor", 85, finalY + 39, { align: "center" });
                    doc.line(160, finalY + 35, 230, finalY + 35);
                    doc.text("Firma del coordinador", 195, finalY + 39, { align: "center" });

                    doc.save(`ITD_Oficial_${meta.Id_Curso.replace(/[^a-z0-9]/gi, '_')}.pdf`);
                } catch (e) {
                    console.error(e);
                    alert("Error generando PDF Oficial: " + e.message);
                }
            };

            const generateCustomPDF = () => {
                if (!activeCourseData) return;
                const { students, meta } = activeCourseData;
                
                try {
                    const doc = new jsPDF('landscape');
                    let startY = 30; // Ajustado ya que no hay imagen de encabezado

                    doc.setFontSize(18);
                    doc.setTextColor(27, 57, 106);
                    doc.text(meta.Curso || "Reporte", 14, 15);
                    doc.setFontSize(10);
                    doc.setTextColor(100);
                    doc.text(`${meta.FechaCurso} | Generado: ${new Date().toLocaleDateString()}`, 14, 22);
                    
                    const body = students.map((s, i) => {
                        const row = [i + 1];
                        selectedFields.forEach(f => row.push(String(s[f] || '')));
                        return row;
                    });

                    autoTable(doc, {
                        startY: startY,
                        head: [['No.', ...selectedFields]],
                        body: body,
                        theme: 'striped',
                        headStyles: { fillColor: [27, 57, 106] },
                    });

                    doc.save(`Reporte_Custom_${meta.Id_Curso}.pdf`);
                } catch (e) {
                    alert("Error generando PDF Custom: " + e.message);
                }
            };

            const generateExcel = () => {
                if (!activeCourseData) return;
                const { students, meta } = activeCourseData;

                const dataToExport = students.map((s, i) => {
                    const row = { "No.": i + 1 };
                    selectedFields.forEach(f => row[f] = s[f]);
                    return row;
                });

                let workbook, worksheet;
                // Lógica de plantilla eliminada, siempre genera libro nuevo
                workbook = XLSX.utils.book_new();
                worksheet = XLSX.utils.json_to_sheet(dataToExport);
                XLSX.utils.book_append_sheet(workbook, worksheet, "Reporte");
                
                XLSX.writeFile(workbook, `Reporte_${meta.Id_Curso}.xlsx`);
            };

            return (
                <div className="flex flex-col min-h-screen">
                    <Header />
                    <LoadingOverlay isLoading={loading} message="Procesando..." />

                    <main className="flex-grow container mx-auto px-4 py-8 max-w-6xl">
                        {/* SECCIÓN DE CARGA */}
                        <div className="bg-white rounded-lg shadow-lg p-6 mb-8 border-t-4" style={{ borderColor: ITD_COLORS.blue }}>
                            <h2 className="text-2xl font-bold mb-6 text-gray-800 flex items-center gap-3">
                                <Database className="text-blue-900" size={24} /> Base de Datos
                            </h2>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                                {/* Carga Alumnos */}
                                <div className="p-6 bg-blue-50 rounded-lg border border-blue-100">
                                    <div className="flex items-center gap-2 mb-2">
                                        <Users className="text-blue-700" size={20} />
                                        <label className="text-lg font-bold text-gray-800">1. Alumnos (General)</label>
                                    </div>
                                    <input type="file" accept=".csv,.xlsx" onChange={handleParticipantUpload} 
                                        className="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:bg-blue-900 file:text-white hover:file:bg-blue-800 cursor-pointer bg-white border border-gray-300 rounded mb-2" />
                                    <p className="text-right text-sm font-bold text-blue-900">{participantData.length} alumnos cargados</p>
                                </div>

                                {/* Carga Instructores */}
                                <div className="p-6 bg-yellow-50 rounded-lg border border-yellow-100">
                                    <div className="flex items-center gap-2 mb-2">
                                        <FileText className="text-yellow-700" size={20} />
                                        <label className="text-lg font-bold text-gray-800">1b. Instructores (Detalles)</label>
                                    </div>
                                    <p className="text-xs text-gray-600 mb-2">Carga aquí el CSV con id, instructor, horario, etc.</p>
                                    <input type="file" accept=".csv,.xlsx" onChange={handleInstructorUpload} 
                                        className="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:bg-yellow-600 file:text-white hover:file:bg-yellow-500 cursor-pointer bg-white border border-gray-300 rounded mb-2" />
                                    <p className="text-right text-sm font-bold text-yellow-800">{instructorData.length} cursos/instructores cargados</p>
                                </div>
                            </div>

                            {/* Filtros */}
                            {participantData.length > 0 && (
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 animate-fade-in">
                                    <div>
                                        <label className="block text-sm font-semibold text-gray-700 mb-2 flex items-center gap-2">
                                            <Calendar size={18} /> 2. Fecha
                                        </label>
                                        <select value={selectedDate} onChange={e => setSelectedDate(e.target.value)} className="w-full p-3 border rounded bg-white">
                                            <option value="">-- Todas --</option>
                                            {availableDates.map(d => <option key={d} value={d}>{d}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-semibold text-gray-700 mb-2 flex items-center gap-2">
                                            <BookOpen size={18} /> 3. Curso
                                        </label>
                                        <select value={selectedCourseId} onChange={e => setSelectedCourseId(e.target.value)} className="w-full p-3 border rounded bg-white">
                                            <option value="">-- Seleccionar --</option>
                                            {availableCourses.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                                        </select>
                                    </div>
                                </div>
                            )}

                            {/* Selector Campos */}
                            {participantData.length > 0 && (
                                <div className="mt-6">
                                    <div className="flex justify-between mb-2">
                                        <label className="font-semibold text-sm">4. Campos visibles</label>
                                        <button onClick={() => setSelectedFields(selectedFields.length === allFields.length ? [] : allFields)} className="text-blue-600 text-xs flex items-center gap-1">
                                            <CheckSquare size={14} /> Toggle
                                        </button>
                                    </div>
                                    <div className="grid grid-cols-2 md:grid-cols-5 gap-2 bg-gray-50 p-4 rounded border max-h-40 overflow-y-auto custom-scrollbar">
                                        {allFields.map(f => (
                                            <label key={f} className="flex items-center space-x-2 text-xs cursor-pointer hover:bg-gray-100 p-1 rounded">
                                                <input type="checkbox" checked={selectedFields.includes(f)} onChange={() => {
                                                    setSelectedFields(prev => prev.includes(f) ? prev.filter(x => x !== f) : [...prev, f])
                                                }} className="rounded text-blue-900" />
                                                <span className="truncate" title={f}>{f}</span>
                                            </label>
                                        ))}
                                    </div>
                                    {/* SECCIÓN DE EXTRAS ELIMINADA */}
                                </div>
                            )}
                        </div>

                        {/* VISTA PREVIA Y ACCIONES */}
                        {activeCourseData && (
                            <div className="bg-white rounded-lg shadow-lg p-6 border border-gray-200 animate-fade-in">
                                <div className="flex flex-col md:flex-row justify-between items-start mb-6 gap-4">
                                    <div>
                                        <h3 className="text-xl font-bold text-gray-900">{activeCourseData.meta.Curso}</h3>
                                        <div className="text-sm text-gray-600 mt-1 space-y-1">
                                            <p><strong>Instructor:</strong> {activeCourseData.meta.NombreInstructor}</p>
                                            <p><strong>Horario:</strong> {activeCourseData.meta.Horario} | <strong>Lugar:</strong> {activeCourseData.meta.Lugar}</p>
                                            <p className="text-xs text-gray-400">ID: {activeCourseData.meta.Id_Curso}</p>
                                        </div>
                                    </div>
                                    <div className="flex flex-wrap gap-2">
                                        <button onClick={generateOfficialPDF} className="bg-gray-800 text-white px-4 py-2 rounded shadow flex items-center text-sm hover:scale-105 transition">
                                            <FileText size={16} className="mr-2" /> Oficial ITD
                                        </button>
                                        <button onClick={generateCustomPDF} style={{backgroundColor: ITD_COLORS.maroon}} className="text-white px-4 py-2 rounded shadow flex items-center text-sm hover:scale-105 transition">
                                            <Download size={16} className="mr-2" /> PDF Custom
                                        </button>
                                        <button onClick={generateExcel} className="bg-green-600 text-white px-4 py-2 rounded shadow flex items-center text-sm hover:scale-105 transition">
                                            <FileSpreadsheet size={16} className="mr-2" /> Excel
                                        </button>
                                    </div>
                                </div>

                                <div className="overflow-x-auto border rounded-lg max-h-[500px]">
                                    <table className="min-w-full divide-y divide-gray-200">
                                        <thead className="bg-gray-50 sticky top-0">
                                            <tr>
                                                <th className="px-4 py-3 text-left text-xs font-bold text-gray-700 uppercase sticky left-0 bg-gray-100">#</th>
                                                {selectedFields.map(f => (
                                                    <th key={f} className="px-4 py-3 text-left text-xs font-bold text-gray-700 uppercase whitespace-nowrap">{f}</th>
                                                ))}
                                            </tr>
                                        </thead>
                                        <tbody className="bg-white divide-y divide-gray-200">
                                            {activeCourseData.students.map((s, idx) => (
                                                <tr key={idx} className="hover:bg-blue-50">
                                                    <td className="px-4 py-2 text-sm text-gray-500 font-medium sticky left-0 bg-white">{idx + 1}</td>
                                                    {selectedFields.map(f => (
                                                        <td key={f} className="px-4 py-2 text-sm text-gray-900 whitespace-nowrap">{s[f] || '-'}</td>
                                                    ))}
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </main>
                    
                    <footer className="bg-gray-800 text-white py-6 mt-auto text-center">
                        <p>&copy; 2025 Instituto Tecnológico de Durango</p>
                    </footer>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
