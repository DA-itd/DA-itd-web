<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Generador de Listas ITD</title>
    
    <!-- Estilos y Fuentes -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f5f7fa; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 3px; }
        #root { min-height: 100vh; }
        .btn-action {
            transition: all 0.2s ease;
        }
        .btn-action:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Cargar React y ReactDOM desde CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Cargar las librerías necesarias -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

    <!-- Babel para JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        // Variables globales de React
        const { useState, useMemo } = React;
        const { createRoot } = ReactDOM;

        // --- CONSTANTES Y CONFIGURACIÓN ---
        const ITD_COLORS = {
            blue: '#1b396a',
            gold: '#d4a017',
            maroon: '#8B1538',
        };

        const LOGO_URL = "https://raw.githubusercontent.com/DA-itd/DA-itd-web/main/logo_itdurango.png";

        const HEADER_MAP_PARTICIPANTS = {
            'folio personal': 'FolioPersonal', 'folio': 'FolioPersonal',
            'nombrecompleto': 'NombreCompleto', 'nombre completo': 'NombreCompleto', 'nombre': 'NombreCompleto', 'participante': 'NombreCompleto', 'alumno': 'NombreCompleto',
            'curp': 'Curp', 'email': 'Email', 'correo': 'Email',
            'rfc': 'Rfc', 'r.f.c.': 'Rfc',
            'departamento': 'Departamento', 'area': 'Departamento', 'adscripcion': 'Departamento',
            'id_curso': 'Id_Curso', 'clave': 'Id_Curso', 'clave curso': 'Id_Curso',
            'curso': 'Curso', 'nombre del curso': 'Curso',
            'fechacurso': 'FechaCurso', 'fecha': 'FechaCurso', 'periodo': 'FechaCurso',
            'horario': 'Horario', 'hora': 'Horario',
            'horas': 'Horas', 'tipo': 'Tipo', 'nivel': 'Nivel', 'puesto': 'Puesto'
        };

        const HEADER_MAP_INSTRUCTORS = {
            'id': 'Id_Curso',
            'name': 'Curso',
            'date': 'FechaCurso',
            'period': 'Periodo',
            'horas': 'Horas',
            'location': 'Lugar',
            'schedule': 'Horario',
            'type': 'Tipo',
            'departamento': 'Departamento',
            'instructor': 'NombreInstructor',
            'curp': 'CurpInstructor', 
            'rfc': 'RfcInstructor'
        };

        // Función para crear iconos manualmente
        const createIcon = (paths, viewBox = "0 0 24 24") => {
            return (props) => {
                const { size = 24, className = "", style = {}, ...rest } = props || {};
                return React.createElement('svg', {
                    xmlns: "http://www.w3.org/2000/svg",
                    width: size,
                    height: size,
                    viewBox: viewBox,
                    fill: "none",
                    stroke: "currentColor",
                    strokeWidth: "2",
                    strokeLinecap: "round",
                    strokeLinejoin: "round",
                    className: className,
                    style: style,
                    ...rest
                }, paths);
            };
        };

        // Definir iconos
        const Database = createIcon([
            React.createElement('ellipse', { cx: "12", cy: "5", rx: "9", ry: "3" }),
            React.createElement('path', { d: "M21 12c0 1.66-4 3-9 3s-9-1.34-9-3" }),
            React.createElement('path', { d: "M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5" })
        ]);

        const Users = createIcon([
            React.createElement('path', { d: "M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" }),
            React.createElement('circle', { cx: "9", cy: "7", r: "4" }),
            React.createElement('path', { d: "M22 21v-2a4 4 0 0 0-3-3.87" }),
            React.createElement('path', { d: "M16 3.13a4 4 0 0 1 0 7.75" })
        ]);

        const FileText = createIcon([
            React.createElement('path', { d: "M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" }),
            React.createElement('polyline', { points: "14 2 14 8 20 8" }),
            React.createElement('line', { x1: "16", y1: "13", x2: "8", y2: "13" }),
            React.createElement('line', { x1: "16", y1: "17", x2: "8", y2: "17" }),
            React.createElement('polyline', { points: "10 9 9 9 8 9" })
        ]);

        const ArrowLeft = createIcon([
            React.createElement('path', { d: "M19 12H5" }),
            React.createElement('path', { d: "M12 19l-7-7 7-7" })
        ]);

        const Loader2 = createIcon([
            React.createElement('path', { d: "M12 2v4" }),
            React.createElement('path', { d: "M12 18v4" }),
            React.createElement('path', { d: "M4.93 4.93l2.83 2.83" }),
            React.createElement('path', { d: "M16.24 16.24l2.83 2.83" }),
            React.createElement('path', { d: "M2 12h4" }),
            React.createElement('path', { d: "M18 12h4" }),
            React.createElement('path', { d: "M4.93 19.07l2.83-2.83" }),
            React.createElement('path', { d: "M16.24 7.76l2.83-2.83" })
        ]);

        const Calendar = createIcon([
            React.createElement('rect', { x: "3", y: "4", width: "18", height: "18", rx: "2", ry: "2" }),
            React.createElement('line', { x1: "16", y1: "2", x2: "16", y2: "6" }),
            React.createElement('line', { x1: "8", y1: "2", x2: "8", y2: "6" }),
            React.createElement('line', { x1: "3", y1: "10", x2: "21", y2: "10" })
        ]);

        const BookOpen = createIcon([
            React.createElement('path', { d: "M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" }),
            React.createElement('path', { d: "M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" })
        ]);

        const CheckSquare = createIcon([
            React.createElement('polyline', { points: "9 11 12 14 22 4" }),
            React.createElement('path', { d: "M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" })
        ]);

        const FileSpreadsheet = createIcon([
            React.createElement('path', { d: "M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" }),
            React.createElement('polyline', { points: "14 2 14 8 20 8" }),
            React.createElement('line', { x1: "8", y1: "13", x2: "16", y2: "13" }),
            React.createElement('line', { x1: "8", y1: "17", x2: "16", y2: "17" }),
            React.createElement('line', { x1: "8", y1: "9", x2: "10", y2: "9" })
        ]);

        const Download = createIcon([
            React.createElement('path', { d: "M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" }),
            React.createElement('polyline', { points: "7 10 12 15 17 10" }),
            React.createElement('line', { x1: "12", y1: "15", x2: "12", y2: "3" })
        ]);

        const Printer = createIcon([
            React.createElement('polyline', { points: "6 9 6 2 18 2 18 9" }),
            React.createElement('path', { d: "M18 9H6a4 4 0 0 0-4 4v6h4v4h12v-4h4v-6a4 4 0 0 0-4-4z" }),
            React.createElement('rect', { x: "10", y: "14", width: "4", height: "4" })
        ]);

        const Eye = createIcon([
            React.createElement('path', { d: "M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" }),
            React.createElement('circle', { cx: "12", cy: "12", r: "3" })
        ]);

        // --- SERVICIOS ---

        const normalizeData = (data, map) => {
            return data.map(row => {
                const newRow = {};
                Object.keys(row).forEach(key => {
                    const cleanKey = key.trim().toLowerCase();
                    let normalizedKey = map[cleanKey];
                    if (!normalizedKey) {
                        const foundKey = Object.keys(map).find(k => cleanKey.includes(k));
                        if (foundKey) normalizedKey = map[foundKey];
                    }
                    newRow[normalizedKey || key.trim()] = row[key];
                });
                return newRow;
            });
        };

        const parseFile = (file, map) => {
            return new Promise((resolve, reject) => {
                const isCSV = file.name.toLowerCase().endsWith('.csv');
                if (isCSV) {
                    Papa.parse(file, {
                        header: true,
                        skipEmptyLines: true,
                        complete: (results) => resolve(normalizeData(results.data, map)),
                        error: (err) => reject(err),
                    });
                } else {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        try {
                            const data = new Uint8Array(e.target.result);
                            const workbook = XLSX.read(data, { type: 'array' });
                            const sheetName = workbook.SheetNames[0];
                            const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName], { defval: "" });
                            resolve(normalizeData(jsonData, map));
                        } catch (err) { reject(err); }
                    };
                    reader.readAsArrayBuffer(file);
                }
            });
        };

        const getBase64ImageFromURL = async (url) => {
            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error('Network response was not ok');
                const blob = await res.blob();
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onloadend = () => resolve(reader.result);
                    reader.onerror = reject;
                    reader.readAsDataURL(blob);
                });
            } catch (error) {
                console.warn("No se pudo cargar el logo, se usará texto alternativo.", error);
                return null;
            }
        };

        // --- FUNCIÓN PARA GENERAR PDF OFICIAL (FORMATO EXACTO) ---
        const generateOfficialPDF = async (students, meta, action = 'download') => {
            console.log('Generando PDF oficial formato ITD-AD-FO-8...', { students: students.length, meta, action });
            
            let printWindow = null;
            if (action === 'print') {
                printWindow = window.open('', '_blank');
                if (printWindow) {
                    printWindow.document.write('<html><head><title>Imprimiendo...</title></head><body style="display:flex;justify-content:center;align-items:center;height:100vh;font-family:sans-serif;"><h3>Generando documento para impresión... Por favor espere.</h3></body></html>');
                } else {
                    alert("Por favor habilita las ventanas emergentes para poder imprimir directamente.");
                    return;
                }
            }

            try {
                const doc = new jsPDF('landscape', 'mm', 'letter');
                const width = doc.internal.pageSize.getWidth();
                const height = doc.internal.pageSize.getHeight();
                const logoBase64 = await getBase64ImageFromURL(LOGO_URL);

                // --- ENCABEZADO COMPLETO SEGÚN EL FORMATO ---
                const drawHeader = (doc, pageNumber, totalPages) => {
                    let y = 10;
                    
                    // Logo
                    if (logoBase64) {
                        doc.addImage(logoBase64, 'PNG', 12, y, 17, 18);
                    }
                    
                    // INSTITUTO TECNOLÓGICO DE DURANGO
                    doc.setFontSize(10);
                    doc.setFont("helvetica", "bold");
                    doc.text("INSTITUTO TECNOLÓGICO DE DURANGO", 35, y + 5);
                    
                    // Código a la derecha
                    doc.setFont("helvetica", "normal");
                    doc.setFontSize(8);
                    doc.text("Código: ITD-AD-FO-8", width - 45, y + 5);
                    
                    y += 8;
                    
                    // Nombre del documento
                    doc.setFontSize(9);
                    doc.setFont("helvetica", "normal");
                    doc.text("Nombre del documento: Formato de Lista de Asistencia", 35, y);
                    doc.text("Referencias a la Norma NMX-CC-9001-IMNC-2008", 35, y + 5);
                    doc.text("6.2.2", 35, y + 10);
                    
                    // Revisión
                    doc.text("Revisión: 1", width - 45, y);
                    
                    y += 12;
                    
                    // Página
                    doc.text(`Página ${pageNumber} de ${totalPages}`, width - 45, y);
                    
                    y += 5;
                    
                    // Fecha de emisión
                    doc.text("Fecha de emisión: 15/noviembre/2013", width - 45, y);
                    
                    y += 10;
                    
                    // Línea horizontal
                    doc.setDrawColor(0);
                    doc.line(10, y, width - 10, y);
                    
                    y += 8;
                    
                    // CURSO PRESENCIAL
                    doc.setFontSize(12);
                    doc.setFont("helvetica", "bold");
                    doc.text("CURSO PRESENCIAL", 35, y);
                    
                    // CLAVE
                    doc.setFontSize(9);
                    doc.setFont("helvetica", "bold");
                    doc.text("CLAVE:", width - 55, y);
                    doc.setFont("helvetica", "normal");
                    doc.text(String(meta.Id_Curso || ""), width - 35, y);
                    
                    y += 10;
                    
                    // Hoja y Folio
                    doc.setFontSize(8);
                    doc.text("Hoja:", 35, y);
                    doc.text(`${pageNumber}`, 45, y);
                    doc.text("de", 55, y);
                    doc.text(`${totalPages}`, 65, y);
                    
                    doc.text("Folio: _________________", width - 55, y);
                    
                    y += 10;
                    
                    // Nombre del curso
                    doc.setFontSize(9);
                    doc.setFont("helvetica", "bold");
                    doc.text("Nombre del curso:", 10, y);
                    doc.setFont("helvetica", "normal");
                    doc.text(meta.Curso || '', 45, y);
                    
                    doc.setFont("helvetica", "bold");
                    doc.text("Folio:", width - 55, y);
                    
                    y += 7;
                    
                    // Nombre del instructor
                    doc.setFont("helvetica", "bold");
                    doc.text("Nombre del instructor (a):", 10, y);
                    doc.setFont("helvetica", "normal");
                    doc.text(meta.NombreInstructor || '', 58, y);
                    
                    y += 7;
                    
                    // Periodo, Duración y Horario
                    doc.setFont("helvetica", "bold");
                    doc.text("Periodo:", 10, y);
                    doc.setFont("helvetica", "normal");
                    doc.text(meta.FechaCurso || meta.Periodo || '', 30, y);
                    
                    doc.setFont("helvetica", "bold");
                    doc.text("Duración:", 70, y);
                    doc.setFont("helvetica", "normal");
                    doc.text(`${meta.Horas || '30'} horas`, 95, y);
                    
                    doc.setFont("helvetica", "bold");
                    doc.text("Horario:", 130, y);
                    doc.setFont("helvetica", "normal");
                    doc.text(meta.Horario || '', 155, y);
                    
                    y += 10;
                };

                // --- PREPARAR DATOS DE LA TABLA ---
                const tableRows = students.map((s, index) => {
                    let nombre = s.NombreCompleto || s.Nombre || "Sin Nombre";
                    nombre = nombre.replace(/\b[MLP]\./gi, '').replace(/\s+/g, ' ').trim();
                    
                    const rfc = s.Rfc || s.Curp || ""; 
                    
                    let depto = s.Departamento || s.Area || "";
                    depto = String(depto).replace(/Departamento/gi, 'Depto.');
                    
                    let nivel = s.Nivel || s.Tipo || "";
                    nivel = String(nivel).replace(/\b[MLP]\./gi, '').replace(/\s+/g, ' ').trim();

                    return [
                        index + 1,
                        nombre,
                        rfc,
                        depto,
                        { content: nivel, colSpan: 2 },
                        '', '', '', '', '', ''  // Días de asistencia
                    ];
                });

                // Rellenar hasta 15 filas
                while(tableRows.length < 15) {
                    tableRows.push([tableRows.length + 1, '', '', '', { content: '', colSpan: 2 }, '', '', '', '', '', '']);
                }

                const totalPagesExp = "{total_pages_count_string}";

                // --- GENERAR TABLA ---
                autoTable(doc, {
                    startY: 68,
                    head: [
                        [
                            { content: 'No.', styles: { valign: 'middle', halign: 'center' }, rowSpan: 2 },
                            { content: 'Nombre del Participante', styles: { valign: 'middle', halign: 'center' }, rowSpan: 2 },
                            { content: 'R.F.C.', styles: { valign: 'middle', halign: 'center' }, rowSpan: 2 },
                            { content: 'Puesto y departamento de adscripción', styles: { valign: 'middle', halign: 'center' }, rowSpan: 2 },
                            { content: 'Nivel de Puesto', styles: { valign: 'middle', halign: 'center' }, colSpan: 2 },
                            { content: 'Asistencia', styles: { valign: 'middle', halign: 'center' }, colSpan: 5 }
                        ],
                        ['', '', '', '', 'FD', 'D', 'L', 'M', 'M', 'J', 'V']
                    ],
                    body: tableRows,
                    theme: 'grid',
                    styles: { 
                        fontSize: 7, 
                        cellPadding: 0.8, 
                        lineColor: [0,0,0], 
                        lineWidth: 0.1, 
                        textColor: [0,0,0],
                        valign: 'middle',
                        halign: 'center'
                    },
                    headStyles: { 
                        fillColor: [255,255,255], 
                        textColor: [0,0,0], 
                        lineWidth: 0.1, 
                        lineColor: [0,0,0], 
                        fontStyle: 'bold',
                        fontSize: 7
                    },
                    columnStyles: {
                        0: { cellWidth: 10, halign: 'center' }, 
                        1: { cellWidth: 70, halign: 'left' },
                        2: { cellWidth: 30, halign: 'center' }, 
                        3: { cellWidth: 70, halign: 'left' },
                        4: { cellWidth: 8, halign: 'center' },
                        5: { cellWidth: 8, halign: 'center' },
                        6: { cellWidth: 8, halign: 'center' }, 
                        7: { cellWidth: 8, halign: 'center' }, 
                        8: { cellWidth: 8, halign: 'center' }, 
                        9: { cellWidth: 8, halign: 'center' }, 
                        10: { cellWidth: 8, halign: 'center' }
                    },
                    margin: { top: 68, left: 10, right: 10, bottom: 35 },
                    didDrawPage: function (data) {
                        drawHeader(doc, data.pageNumber, totalPagesExp);
                    },
                    didParseCell: function(data) {
                        // Asegurar que las celdas de los días tengan el mismo estilo
                        if (data.section === 'body' && data.column.index >= 5) {
                            data.cell.styles.halign = 'center';
                        }
                    }
                });

                // --- FIRMAS Y PIE DE PÁGINA ---
                const finalY = doc.lastAutoTable.finalY || 150;
                let y = finalY + 5;
                
                // FD = Funcionario docente D = Docente
                doc.setFontSize(7);
                doc.setFont("helvetica", "normal");
                doc.text("FD = Funcionario docente               D = Docente", 10, y);
                
                y += 12;
                
                // Líneas de firma
                // Instructor
                doc.line(30, y, 120, y);
                doc.setFontSize(8);
                doc.setFont("helvetica", "bold");
                doc.text(String(meta.NombreInstructor || ""), 75, y - 2, { align: "center" });
                doc.setFont("helvetica", "normal");
                doc.text("Nombre y firma del instructor (a)", 75, y + 4, { align: "center" });
                
                // Coordinador
                doc.line(155, y, 245, y);
                doc.setFont("helvetica", "bold");
                doc.text("Alejandro Calderón Rentería", 200, y - 2, { align: "center" });
                doc.setFont("helvetica", "normal");
                doc.text("Nombre y firma del coordinador (a)", 200, y + 4, { align: "center" });
                
                y += 10;
                
                // RFC y CURP del instructor
                doc.setFontSize(7);
                doc.setFont("helvetica", "bold");
                doc.text("R.F.C.", 30, y);
                doc.setFont("helvetica", "normal");
                const rfcInst = String(meta.RfcInstructor || meta.Rfc || "");
                doc.text(rfcInst, 45, y);
                if(!rfcInst) doc.line(45, y, 120, y);
                
                doc.setFont("helvetica", "bold");
                doc.text("CURP", 30, y + 5);
                doc.setFont("helvetica", "normal");
                const curpInst = String(meta.CurpInstructor || meta.Curp || "");
                doc.text(curpInst, 45, y + 5);
                if(!curpInst) doc.line(45, y + 5, 120, y + 5);
                
                y += 12;
                
                // Pie de página
                doc.setFontSize(7);
                doc.text("ITD-AD-FO-8", 10, height - 8);
                doc.text("Revisión: 1", width - 25, height - 8);

                // Actualizar páginas
                const pageCount = doc.internal.getNumberOfPages();
                for(let i = 1; i <= pageCount; i++) {
                    doc.setPage(i);
                }

                if (typeof doc.putTotalPages === 'function') {
                    doc.putTotalPages(totalPagesExp);
                }
                
                // Guardar o imprimir
                if (action === 'print' && printWindow) {
                    doc.autoPrint();
                    const blob = doc.output('bloburl');
                    printWindow.location.href = blob;
                } else {
                    const fileName = `ITD-AD-FO-08_${meta.Id_Curso ? meta.Id_Curso.replace(/[^a-z0-9]/gi, '_') : 'curso'}.pdf`;
                    doc.save(fileName);
                    console.log('PDF guardado como:', fileName);
                }

            } catch (e) {
                console.error('Error en generateOfficialPDF:', e);
                if (printWindow) printWindow.close();
                alert("Error generando PDF Oficial: " + e.message);
                throw e;
            }
        };

        // --- COMPONENTES UI (igual que antes) ---
        const LoadingOverlay = ({ isLoading, message }) => {
            if (!isLoading) return null;
            return React.createElement('div', { className: "fixed inset-0 z-50 flex flex-col items-center justify-center bg-white/80 backdrop-blur-sm" },
                React.createElement(Loader2, { className: "animate-spin h-12 w-12 mb-3", style: { color: ITD_COLORS.blue } }),
                React.createElement('p', { className: "font-semibold", style: { color: ITD_COLORS.blue } }, message)
            );
        };

        const Header = () => {
            return React.createElement('header', { className: "bg-white shadow-md sticky top-0 z-20" },
                React.createElement('div', { className: "container mx-auto px-4 py-4 flex justify-between items-center" },
                    React.createElement('div', { className: "flex items-center gap-4" },
                        React.createElement('img', { src: LOGO_URL, alt: "ITD Logo", className: "h-12 w-auto object-contain" }),
                        React.createElement('div', { className: "hidden md:block" },
                            React.createElement('h1', { className: "text-xl font-bold text-gray-800" }, "Generador de Listas ITD"),
                            React.createElement('p', { className: "text-sm text-gray-600" }, "Formato ITD-AD-FO-8")
                        )
                    ),
                    React.createElement('a', { href: "#", className: "text-gray-600 hover:text-blue-800 font-medium flex items-center gap-2" },
                        React.createElement(ArrowLeft, { size: 18 }),
                        React.createElement('span', { className: "hidden sm:inline" }, "Volver")
                    )
                ),
                React.createElement('div', { className: "h-2 w-full", style: { backgroundColor: ITD_COLORS.maroon } })
            );
        };

        // --- COMPONENTE DE VISTA PREVIA ---
        const PreviewModal = ({ isOpen, onClose, students, selectedFields }) => {
            if (!isOpen) return null;

            return React.createElement('div', { 
                className: "fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm",
                onClick: (e) => {
                    if (e.target === e.currentTarget) onClose();
                }
            },
                React.createElement('div', { className: "bg-white rounded-xl shadow-2xl max-w-6xl w-full max-h-[90vh] flex flex-col m-4" },
                    React.createElement('div', { className: "flex justify-between items-center p-4 border-b" },
                        React.createElement('h3', { className: "text-lg font-bold text-gray-800" }, "Vista Previa de Datos"),
                        React.createElement('button', { 
                            onClick: onClose,
                            className: "text-gray-500 hover:text-gray-700 p-1 rounded hover:bg-gray-100"
                        }, "✕")
                    ),
                    React.createElement('div', { className: "overflow-auto flex-1 p-4" },
                        React.createElement('table', { className: "min-w-full divide-y divide-gray-200" },
                            React.createElement('thead', { className: "bg-gray-50 sticky top-0" },
                                React.createElement('tr', null,
                                    React.createElement('th', { className: "px-4 py-3 text-left text-xs font-bold text-gray-700 uppercase sticky left-0 bg-gray-100" }, "#"),
                                    selectedFields.map(f => 
                                        React.createElement('th', { key: f, className: "px-4 py-3 text-left text-xs font-bold text-gray-700 uppercase whitespace-nowrap" }, f)
                                    )
                                )
                            ),
                            React.createElement('tbody', { className: "bg-white divide-y divide-gray-200" },
                                students.map((s, idx) => 
                                    React.createElement('tr', { key: idx, className: "hover:bg-blue-50" },
                                        React.createElement('td', { className: "px-4 py-2 text-sm text-gray-500 font-medium sticky left-0 bg-white" }, idx + 1),
                                        selectedFields.map(f => 
                                            React.createElement('td', { key: f, className: "px-4 py-2 text-sm text-gray-900 whitespace-nowrap" }, s[f] || '-')
                                        )
                                    )
                                )
                            )
                        )
                    ),
                    React.createElement('div', { className: "p-4 border-t flex justify-end" },
                        React.createElement('button', { 
                            onClick: onClose,
                            className: "px-4 py-2 bg-gray-800 text-white rounded hover:bg-gray-700"
                        }, "Cerrar")
                    )
                )
            );
        };

        // --- APP PRINCIPAL ---
        const App = () => {
            const [participantData, setParticipantData] = useState([]);
            const [instructorData, setInstructorData] = useState([]);
            const [loading, setLoading] = useState(false);
            
            const [allFields, setAllFields] = useState([]);
            const [selectedFields, setSelectedFields] = useState([]);
            
            const [selectedDate, setSelectedDate] = useState("");
            const [selectedCourseId, setSelectedCourseId] = useState("");
            const [showPreview, setShowPreview] = useState(false);

            const availableDates = useMemo(() => {
                const datesSet = new Set();
                participantData.forEach(r => r.FechaCurso && datesSet.add(r.FechaCurso.trim()));
                instructorData.forEach(r => r.FechaCurso && datesSet.add(r.FechaCurso.trim()));
                return Array.from(datesSet).sort();
            }, [participantData, instructorData]);

            const availableCourses = useMemo(() => {
                const coursesMap = new Map();
                instructorData.forEach(c => {
                    if (selectedDate && c.FechaCurso !== selectedDate) return;
                    coursesMap.set(c.Id_Curso, c.Curso);
                });
                participantData.forEach(row => {
                    if (selectedDate && row.FechaCurso !== selectedDate) return;
                    const id = String(row.Id_Curso || row.Curso || "");
                    const name = String(row.Curso || "Sin Nombre");
                    if (id && !coursesMap.has(id)) {
                        coursesMap.set(id, name);
                    }
                });
                return Array.from(coursesMap.entries())
                    .map(([id, name]) => ({ id, name }))
                    .sort((a, b) => a.name.localeCompare(b.name));
            }, [participantData, instructorData, selectedDate]);

            const activeCourseData = useMemo(() => {
                if (!selectedCourseId) return null;
                let meta = instructorData.find(c => String(c.Id_Curso) === selectedCourseId);
                const students = participantData.filter(s => 
                    String(s.Id_Curso) === selectedCourseId || String(s.Curso) === selectedCourseId
                );

                if (!meta && students.length > 0) {
                    const first = students[0];
                    meta = {
                        Id_Curso: first.Id_Curso || "",
                        Curso: first.Curso || "",
                        FechaCurso: first.FechaCurso || "",
                        Periodo: first.Periodo || "",
                        Horas: first.Horas || "30",
                        Lugar: first.Lugar || "",
                        Horario: first.Horario || "",
                        Tipo: first.Tipo || "",
                        Departamento: first.Departamento || "",
                        NombreInstructor: first.NombreInstructor || first.Instructor || "Por definir",
                        CurpInstructor: "",
                        RfcInstructor: ""
                    };
                }
                if (!meta) return null;

                const mergedStudents = students.map(s => ({
                    ...s,
                    NombreInstructor: meta.NombreInstructor || s.NombreInstructor,
                    Horario: meta.Horario || s.Horario,
                    Lugar: meta.Lugar || s.Lugar,
                    Departamento: s.Departamento || meta.Departamento
                }));

                return { meta, students: mergedStudents };
            }, [selectedCourseId, participantData, instructorData]);

            const handleParticipantUpload = async (e) => {
                const file = e.target.files?.[0];
                if (!file) return;
                setLoading(true);
                try {
                    const data = await parseFile(file, HEADER_MAP_PARTICIPANTS);
                    setParticipantData(data);
                    
                    const fields = new Set();
                    data.forEach(r => Object.keys(r).forEach(k => fields.add(k)));
                    const fieldArray = Array.from(fields);
                    setAllFields(fieldArray);
                    
                    const defaults = ['FolioPersonal', 'NombreCompleto', 'Curp', 'Email', 'Curso', 'Departamento'];
                    setSelectedFields(fieldArray.filter(f => defaults.includes(f)));
                } catch (err) {
                    alert("Error al leer archivo de participantes: " + err.message);
                } finally { setLoading(false); }
            };

            const handleInstructorUpload = async (e) => {
                const file = e.target.files?.[0];
                if (!file) return;
                setLoading(true);
                try {
                    const data = await parseFile(file, HEADER_MAP_INSTRUCTORS);
                    setInstructorData(data);
                    setAllFields(prev => {
                        const combined = new Set([...prev, "NombreInstructor", "Lugar", "Horas", "Periodo", "Horario"]);
                        return Array.from(combined);
                    });
                } catch (err) {
                    alert("Error al leer archivo de instructores.");
                } finally { setLoading(false); }
            };

            // Función para generar PDF Custom
            const generateCustomPDF = () => {
                if (!activeCourseData) {
                    alert('No hay datos del curso seleccionado');
                    return;
                }
                const { students, meta } = activeCourseData;
                console.log('Generando PDF Custom...', { students: students.length, meta, selectedFields });
                
                try {
                    const doc = new jsPDF('landscape');
                    let startY = 30;
                    doc.setFontSize(18);
                    doc.setTextColor(27, 57, 106);
                    doc.text(meta.Curso || "Reporte", 14, 15);
                    doc.setFontSize(10);
                    doc.setTextColor(100);
                    doc.text(`${meta.FechaCurso || ''} | Generado: ${new Date().toLocaleDateString()}`, 14, 22);
                    const body = students.map((s, i) => {
                        const row = [i + 1];
                        selectedFields.forEach(f => row.push(String(s[f] || '')));
                        return row;
                    });
                    autoTable(doc, {
                        startY: startY,
                        head: [['No.', ...selectedFields]],
                        body: body,
                        theme: 'striped',
                        headStyles: { fillColor: [27, 57, 106] },
                    });
                    const fileName = `Reporte_Custom_${meta.Id_Curso ? meta.Id_Curso.replace(/[^a-z0-9]/gi, '_') : 'curso'}.pdf`;
                    doc.save(fileName);
                    console.log('PDF Custom guardado como:', fileName);
                } catch (e) {
                    console.error('Error en generateCustomPDF:', e);
                    alert("Error generando PDF Custom: " + e.message);
                }
            };

            // Función para generar Excel
            const generateExcel = () => {
                if (!activeCourseData) {
                    alert('No hay datos del curso seleccionado');
                    return;
                }
                const { students, meta } = activeCourseData;
                console.log('Generando Excel...', { students: students.length, meta, selectedFields });
                
                try {
                    const dataToExport = students.map((s, i) => {
                        const row = { "No.": i + 1 };
                        selectedFields.forEach(f => row[f] = s[f] || '');
                        return row;
                    });
                    let workbook = XLSX.utils.book_new();
                    let worksheet = XLSX.utils.json_to_sheet(dataToExport);
                    XLSX.utils.book_append_sheet(workbook, worksheet, "Reporte");
                    const fileName = `Reporte_${meta.Id_Curso ? meta.Id_Curso.replace(/[^a-z0-9]/gi, '_') : 'curso'}.xlsx`;
                    XLSX.writeFile(workbook, fileName);
                    console.log('Excel guardado como:', fileName);
                } catch (e) {
                    console.error('Error en generateExcel:', e);
                    alert("Error generando Excel: " + e.message);
                }
            };

            // Wrappers para las funciones de PDF oficial
            const handleOfficialPDF = async (action) => {
                if (!activeCourseData) {
                    alert('No hay datos del curso seleccionado');
                    return;
                }
                console.log('handleOfficialPDF llamado con action:', action);
                setLoading(true);
                try {
                    await generateOfficialPDF(activeCourseData.students, activeCourseData.meta, action);
                } catch (e) {
                    console.error('Error en handleOfficialPDF:', e);
                } finally {
                    setLoading(false);
                }
            };

            return React.createElement('div', { className: "flex flex-col min-h-screen" },
                React.createElement(Header, null),
                React.createElement(LoadingOverlay, { isLoading: loading, message: "Generando documento..." }),
                React.createElement('main', { className: "flex-grow container mx-auto px-4 py-8 max-w-6xl" },
                    // SECCIÓN DE CARGA
                    React.createElement('div', { className: "bg-white rounded-lg shadow-lg p-6 mb-8 border-t-4", style: { borderColor: ITD_COLORS.blue } },
                        React.createElement('h2', { className: "text-2xl font-bold mb-6 text-gray-800 flex items-center gap-3" },
                            React.createElement(Database, { className: "text-blue-900", size: 24 }), 
                            " Base de Datos"
                        ),
                        React.createElement('div', { className: "grid grid-cols-1 md:grid-cols-2 gap-6 mb-6" },
                            React.createElement('div', { className: "p-6 bg-blue-50 rounded-lg border border-blue-100" },
                                React.createElement('div', { className: "flex items-center gap-2 mb-2" },
                                    React.createElement(Users, { className: "text-blue-700", size: 20 }),
                                    React.createElement('label', { className: "text-lg font-bold text-gray-800" }, "1. Alumnos (General)")
                                ),
                                React.createElement('input', { 
                                    type: "file", 
                                    accept: ".csv,.xlsx", 
                                    onChange: handleParticipantUpload,
                                    className: "block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:bg-blue-900 file:text-white hover:file:bg-blue-800 cursor-pointer bg-white border border-gray-300 rounded mb-2" 
                                }),
                                React.createElement('p', { className: "text-right text-sm font-bold text-blue-900" }, participantData.length, " alumnos cargados")
                            ),
                            React.createElement('div', { className: "p-6 bg-yellow-50 rounded-lg border border-yellow-100" },
                                React.createElement('div', { className: "flex items-center gap-2 mb-2" },
                                    React.createElement(FileText, { className: "text-yellow-700", size: 20 }),
                                    React.createElement('label', { className: "text-lg font-bold text-gray-800" }, "1b. Instructores (Detalles)")
                                ),
                                React.createElement('p', { className: "text-xs text-gray-600 mb-2" }, 
                                    "Carga aquí el CSV con id, instructor, horario, ", 
                                    React.createElement('strong', null, "CURP"), 
                                    ", etc."
                                ),
                                React.createElement('input', { 
                                    type: "file", 
                                    accept: ".csv,.xlsx", 
                                    onChange: handleInstructorUpload,
                                    className: "block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:bg-yellow-600 file:text-white hover:file:bg-yellow-500 cursor-pointer bg-white border border-gray-300 rounded mb-2" 
                                }),
                                React.createElement('p', { className: "text-right text-sm font-bold text-yellow-800" }, instructorData.length, " cursos/instructores cargados")
                            )
                        ),
                        participantData.length > 0 && React.createElement('div', { className: "grid grid-cols-1 md:grid-cols-2 gap-6 animate-fade-in" },
                            React.createElement('div', null,
                                React.createElement('label', { className: "block text-sm font-semibold text-gray-700 mb-2 flex items-center gap-2" },
                                    React.createElement(Calendar, { size: 18 }), " 2. Fecha"
                                ),
                                React.createElement('select', { 
                                    value: selectedDate, 
                                    onChange: e => setSelectedDate(e.target.value), 
                                    className: "w-full p-3 border rounded bg-white" 
                                },
                                    React.createElement('option', { value: "" }, "-- Todas --"),
                                    availableDates.map(d => React.createElement('option', { key: d, value: d }, d))
                                )
                            ),
                            React.createElement('div', null,
                                React.createElement('label', { className: "block text-sm font-semibold text-gray-700 mb-2 flex items-center gap-2" },
                                    React.createElement(BookOpen, { size: 18 }), " 3. Curso"
                                ),
                                React.createElement('select', { 
                                    value: selectedCourseId, 
                                    onChange: e => setSelectedCourseId(e.target.value), 
                                    className: "w-full p-3 border rounded bg-white" 
                                },
                                    React.createElement('option', { value: "" }, "-- Seleccionar --"),
                                    availableCourses.map(c => React.createElement('option', { key: c.id, value: c.id }, c.name))
                                )
                            )
                        ),
                        participantData.length > 0 && React.createElement('div', { className: "mt-6" },
                            React.createElement('div', { className: "flex justify-between mb-2" },
                                React.createElement('label', { className: "font-semibold text-sm" }, "4. Campos visibles"),
                                React.createElement('button', { 
                                    onClick: () => setSelectedFields(selectedFields.length === allFields.length ? [] : allFields), 
                                    className: "text-blue-600 text-xs flex items-center gap-1" 
                                },
                                    React.createElement(CheckSquare, { size: 14 }), " Toggle"
                                )
                            ),
                            React.createElement('div', { className: "grid grid-cols-2 md:grid-cols-5 gap-2 bg-gray-50 p-4 rounded border max-h-40 overflow-y-auto custom-scrollbar" },
                                allFields.map(f => 
                                    React.createElement('label', { key: f, className: "flex items-center space-x-2 text-xs cursor-pointer hover:bg-gray-100 p-1 rounded" },
                                        React.createElement('input', { 
                                            type: "checkbox", 
                                            checked: selectedFields.includes(f), 
                                            onChange: () => {
                                                setSelectedFields(prev => prev.includes(f) ? prev.filter(x => x !== f) : [...prev, f])
                                            },
                                            className: "rounded text-blue-900" 
                                        }),
                                        React.createElement('span', { className: "truncate", title: f }, f)
                                    )
                                )
                            )
                        )
                    ),
                    // SECCIÓN DE RESULTADOS
                    activeCourseData && React.createElement('div', { className: "bg-white rounded-lg shadow-lg p-6 border border-gray-200 animate-fade-in" },
                        React.createElement('div', { className: "flex flex-col md:flex-row justify-between items-start mb-6 gap-4" },
                            React.createElement('div', null,
                                React.createElement('h3', { className: "text-xl font-bold text-gray-900" }, activeCourseData.meta.Curso),
                                React.createElement('div', { className: "text-sm text-gray-600 mt-1 space-y-1" },
                                    React.createElement('p', null, 
                                        React.createElement('strong', null, "Instructor:"), " ", activeCourseData.meta.NombreInstructor || "Por definir"
                                    ),
                                    React.createElement('p', null, 
                                        React.createElement('strong', null, "Horario:"), " ", activeCourseData.meta.Horario || "No definido", 
                                        " | ", React.createElement('strong', null, "Lugar:"), " ", activeCourseData.meta.Lugar || "No definido"
                                    ),
                                    React.createElement('p', { className: "text-xs text-gray-400" }, 
                                        "ID: ", activeCourseData.meta.Id_Curso || "Sin ID", 
                                        " | Alumnos: ", activeCourseData.students.length
                                    )
                                )
                            ),
                            React.createElement('div', { className: "flex flex-wrap gap-2" },
                                React.createElement('button', { 
                                    onClick: () => setShowPreview(true),
                                    className: "bg-blue-600 text-white px-4 py-2 rounded shadow flex items-center text-sm btn-action" 
                                },
                                    React.createElement(Eye, { size: 16, className: "mr-2" }), " Vista Previa"
                                ),
                                React.createElement('button', { 
                                    onClick: () => handleOfficialPDF('print'), 
                                    className: "bg-blue-700 text-white px-4 py-2 rounded shadow flex items-center text-sm btn-action" 
                                },
                                    React.createElement(Printer, { size: 16, className: "mr-2" }), " Imprimir"
                                ),
                                React.createElement('button', { 
                                    onClick: () => handleOfficialPDF('download'), 
                                    className: "bg-gray-800 text-white px-4 py-2 rounded shadow flex items-center text-sm btn-action" 
                                },
                                    React.createElement(FileText, { size: 16, className: "mr-2" }), " Oficial ITD"
                                ),
                                React.createElement('button', { 
                                    onClick: generateCustomPDF, 
                                    style: {backgroundColor: ITD_COLORS.maroon}, 
                                    className: "text-white px-4 py-2 rounded shadow flex items-center text-sm btn-action" 
                                },
                                    React.createElement(Download, { size: 16, className: "mr-2" }), " PDF Custom"
                                ),
                                React.createElement('button', { 
                                    onClick: generateExcel, 
                                    className: "bg-green-600 text-white px-4 py-2 rounded shadow flex items-center text-sm btn-action" 
                                },
                                    React.createElement(FileSpreadsheet, { size: 16, className: "mr-2" }), " Excel"
                                )
                            )
                        ),
                        // Tabla compacta de vista rápida
                        React.createElement('div', { className: "overflow-x-auto border rounded-lg max-h-[300px]" },
                            React.createElement('table', { className: "min-w-full divide-y divide-gray-200" },
                                React.createElement('thead', { className: "bg-gray-50 sticky top-0" },
                                    React.createElement('tr', null,
                                        React.createElement('th', { className: "px-4 py-2 text-left text-xs font-bold text-gray-700 uppercase sticky left-0 bg-gray-100" }, "#"),
                                        selectedFields.slice(0, 4).map(f => 
                                            React.createElement('th', { key: f, className: "px-4 py-2 text-left text-xs font-bold text-gray-700 uppercase whitespace-nowrap" }, f)
                                        ),
                                        activeCourseData.students.length > 4 && 
                                            React.createElement('th', { className: "px-4 py-2 text-left text-xs font-bold text-gray-700 uppercase" }, "...")
                                    )
                                ),
                                React.createElement('tbody', { className: "bg-white divide-y divide-gray-200" },
                                    activeCourseData.students.slice(0, 10).map((s, idx) => 
                                        React.createElement('tr', { key: idx, className: "hover:bg-blue-50" },
                                            React.createElement('td', { className: "px-4 py-2 text-sm text-gray-500 font-medium sticky left-0 bg-white" }, idx + 1),
                                            selectedFields.slice(0, 4).map(f => 
                                                React.createElement('td', { key: f, className: "px-4 py-2 text-sm text-gray-900 whitespace-nowrap" }, s[f] || '-')
                                            ),
                                            activeCourseData.students.length > 4 && 
                                                React.createElement('td', { className: "px-4 py-2 text-sm text-gray-400" }, 
                                                    activeCourseData.students.length > 10 ? `+${activeCourseData.students.length - 10} más` : "..."
                                                )
                                        )
                                    )
                                )
                            )
                        ),
                        React.createElement('div', { className: "mt-3 text-xs text-gray-500 text-right" },
                            "Mostrando ", Math.min(10, activeCourseData.students.length), " de ", activeCourseData.students.length, " registros"
                        )
                    )
                ),
                React.createElement('footer', { className: "bg-gray-800 text-white py-6 mt-auto text-center" },
                    React.createElement('p', null, "\u00A9 2025 Instituto Tecnológico de Durango")
                ),
                // Modal de vista previa
                React.createElement(PreviewModal, {
                    isOpen: showPreview,
                    onClose: () => setShowPreview(false),
                    students: activeCourseData ? activeCourseData.students : [],
                    selectedFields: selectedFields
                })
            );
        };

        // Renderizar la aplicación
        const rootElement = document.getElementById('root');
        if (rootElement) {
            try {
                const root = createRoot(rootElement);
                root.render(React.createElement(App));
                console.log('✅ Aplicación renderizada correctamente');
            } catch (error) {
                console.error('❌ Error al renderizar:', error);
                rootElement.innerHTML = `<div style="padding:20px;color:red;background:#fee;border:1px solid red;border-radius:8px;">
                    <h3>Error al cargar la aplicación</h3>
                    <p>${error.message}</p>
                    <p style="font-size:12px;color:#666;">Revisa la consola para más detalles</p>
                </div>`;
            }
        }
    </script>
</body>
</html>
